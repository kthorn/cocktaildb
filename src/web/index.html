<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Cocktail recipe database with hierarchical ingredient taxonomy, UMAP similarity analytics, and a free public API. Search by name, ingredient, or category.">
        <meta property="og:title" content="Mixology Tools — Cocktail Recipe Database">
        <meta property="og:description" content="Open cocktail database with hierarchical ingredient taxonomy and free public API">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://mixology.tools/">
        <link rel="canonical" href="https://mixology.tools">
        <title>Mixology Tools</title>
        <!-- Prevent FOUC (Flash of Unstyled Content) with common.js fallback -->
    </head>

    <body>
        <!-- Header will be loaded by common.js -->

        <main>
            <noscript>
                <h1>Mixology Tools</h1>
                <p>A curated cocktail recipe database with a hierarchical ingredient taxonomy,
                   UMAP similarity analytics, and a free public API.</p>
                <nav>
                    <ul>
                        <li><a href="/about.html">About — how the ingredient hierarchy and analytics work</a></li>
                        <li><a href="/search.html">Search recipes</a></li>
                        <li><a href="/analytics.html">Analytics — ingredient usage, complexity, cocktail similarity maps</a></li>
                        <li><a href="/api/v1/docs">API Documentation (Swagger UI)</a></li>
                        <li><a href="/api/v1/openapi.json">OpenAPI Spec (JSON)</a></li>
                    </ul>
                </nav>
                <p>The database and API are free and open. Source code on
                   <a href="https://github.com/kthorn/cocktaildb">GitHub</a>.</p>
            </noscript>

            <section class="recipe-carousel">
                <div class="carousel-container">
                    <button id="prev-recipe"
                        class="carousel-arrow">&larr;</button>
                    <div id="recipe-display" class="carousel-content">
                        <!-- Recipe card will be displayed here -->
                        <div class="loading-placeholder">
                            <p>Loading recipe...</p>
                        </div>
                    </div>
                    <button id="next-recipe"
                        class="carousel-arrow">&rarr;</button>
                </div>
            </section>

            <section class="stats-footer">
                <p class="stats-text">
                    Database contains <span id="total-ingredients">...</span>
                    ingredients and
                    <span id="total-recipes">...</span> recipes
                </p>
            </section>
        </main>

        <!-- Footer will be loaded by common.js -->

        <script type="module" src="js/common.js"></script>
        <script type="module" src="js/index.js"></script>
    </body>

</html>
