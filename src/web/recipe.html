<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Cocktail recipe details including ingredients, instructions, and ratings.">
        <title>Recipe - Mixology Tools</title>
        <!-- Prevent FOUC (Flash of Unstyled Content) with common.js fallback -->
    </head>

    <body>
        <!-- Header will be loaded by common.js -->

        <main>
            <section class="section-title">
                <h2 id="recipe-page-title">Recipe</h2>
            </section>

            <section class="recipe-display-section">
                <div id="recipe-container">
                    <!-- Recipe card will be displayed here -->
                    <div class="loading-placeholder">
                        <p>Loading recipe...</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer will be loaded by common.js -->

        <script type="module" src="js/common.js"></script>
        <script type="module" src="js/recipe.js"></script>
    </body>

</html>
